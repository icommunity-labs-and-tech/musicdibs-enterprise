name: Publish SDK to npm

on:
  push:
    tags:
      - "sdk-v*"   # trigger: git tag sdk-v0.1.0 && git push --tags

jobs:
  publish:
    name: Build & publish @musicdibs/enterprise-sdk
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
          cache-dependency-path: sdk/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build
        run: npm run build

      - name: Verify dist exists
        run: ls -la dist/

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.ref_name }}"          # sdk-v0.1.0
          VERSION="${TAG#sdk-v}"                 # 0.1.0
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"

      - name: Bump version in package.json
        run: npm version ${{ steps.version.outputs.version }} --no-git-tag-version

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "SDK v${{ steps.version.outputs.version }}"
          body: |
            ## @musicdibs/enterprise-sdk v${{ steps.version.outputs.version }}

            ### Install
            ```bash
            npm install @musicdibs/enterprise-sdk@${{ steps.version.outputs.version }}
            ```

            ### What's changed
            See [CHANGELOG](https://github.com/icommunity-labs-and-tech/musicdibs-enterprise/blob/main/sdk/CHANGELOG.md) for details.
          files: |
            sdk/dist/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
