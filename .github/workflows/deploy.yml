name: Deploy to Vercel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_ORG_ID: team_HkswivMeKHr8orSfHV1UxJUP
  VERCEL_PROJECT_ID: prj_bfx2RV2gLDDQrIioe2RYE8c1FpIC

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy Production (main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: vercel deploy --prod --token=$VERCEL_TOKEN --yes

      - name: Deploy Preview (PR)
        if: github.event_name == 'pull_request'
        run: vercel deploy --token=$VERCEL_TOKEN --yes
