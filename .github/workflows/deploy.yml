name: Deploy to Vercel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_PROJECT_ID: prj_bfx2RV2gLDDQrIioe2RYE8c1FpIC
  VERCEL_TEAM_ID: team_HkswivMeKHr8orSfHV1UxJUP

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel (Preview on PR / Production on main)
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            vercel deploy --prod \
              --token=$VERCEL_TOKEN \
              --scope=$VERCEL_TEAM_ID \
              --yes
          else
            vercel deploy \
              --token=$VERCEL_TOKEN \
              --scope=$VERCEL_TEAM_ID \
              --yes
          fi
